<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G_ONE FF</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(-45deg,#000,#001d4a,#003d99,#000);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:white;
overflow-x:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

#loader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
animation:hide 2.5s forwards;
animation-delay:2.5s;
}

#loader h1{
font-size:45px;
color:#00c3ff;
text-shadow:0 0 20px #00c3ff;
}

.bar{
width:220px;
height:8px;
background:#222;
margin-top:20px;
border-radius:50px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#00c3ff;
animation:load 2.5s forwards;
}

@keyframes load{
to{width:100%;}
}

@keyframes hide{
to{
opacity:0;
visibility:hidden;
}
}

header{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.logo{
font-size:60px;
font-weight:bold;
color:#00c3ff;
text-shadow:0 0 25px #00c3ff;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 15px #00c3ff;}
to{text-shadow:0 0 40px #00c3ff;}
}

.slogan{
margin-top:20px;
font-size:22px;
opacity:.9;
}

.btn{
margin-top:35px;
padding:15px 40px;
border:none;
border-radius:50px;
background:#00c3ff;
color:#fff;
font-size:18px;
cursor:pointer;
transition:.3s;
text-decoration:none;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 25px #00c3ff;
}

.social{
margin-top:20px;
}

.social a{
color:#00c3ff;
text-decoration:none;
font-size:18px;
}
</style>
</head>

<body>

<div id="loader">
<h1>⚡ G_ONE FF ⚡</h1>
<div class="bar">
<div class="fill"></div>
</div>
<p style="margin-top:15px;">Chargement...</p>
</div>

<header>

<div class="logo">
G_ONE FF
</div>

<p class="slogan">
🎮 Le Headshot commence ici.
</p>

<a href="#suite" class="btn">
🎮 Entrer
</a>

<div class="social">
<a href="https://www.tiktok.com/@g_one243" target="_blank">
📱 TikTok : @g_one243
</a>
</div>

</header>

<section id="suite" style="padding:50px;text-align:center;">
<h2>Bienvenue 👋</h2>
<p>La suite du site arrive dans la Partie 2...</p>
</section>

</body>
</html>
